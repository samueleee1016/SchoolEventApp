<html>
    <head>
        <title>url not found</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, Helvetica, sans-serif;
            }

            body {
                background-color: #cfd7e9;
                color: #003366;
                min-height: 100vh;
                padding-top: 60px;
            }

            h3 {
                text-align: center;
                font-size: 35px;
                margin-bottom: 50px;
                color: #3f95eb;
                letter-spacing: 1px;
                font-family: "Georgia", Times, serif
            }

            p {
                margin-top: 6px;
                color: #751414;
                font-weight: bold;
                text-align: center;
                text-shadow: 0 0 6px rgba(255, 59, 59, 0.55);
            }

            .container {
                max-width: 600px;
                margin: 0 auto;
            }   

            .card {
                display: block;
                background-color: #3f95eb;
                padding: 26px 30px;
                margin-bottom: 22px;
                border-radius: 14px;
                text-decoration: none;
                color: #e5e7eb;
                font-size: 18px;
                box-shadow: 0 10px 22px rgba(0, 0, 0, 0.5);
                transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            }

            .card:hover {
                background-color: #2f73b7;
                transform: translateY(-4px);
                box-shadow: 0 16px 32px rgba(0, 0, 0, 0.65);
            }

            .card span {
                color: #38bdf8; 
                font-weight: bold;
            }

            .card:active {
                transform: translateY(-1px);
                box-shadow: 0 6px 14px rgba(0, 0, 0, 0.6);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h3>School event app</h3>

            <a class="card">

            </a> -->
        </div>
    </body>
