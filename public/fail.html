<html>
    <head>
        <style>
            body {
                font-family: "Arial", sans-serif;
                background-color: #d5dbec; 
                color: #d15441;
                margin: 30px 40px;
            }

            h3 {
                font-size: 24px;
                margin-bottom: 15px;
                color: #da4832;
            }

            .card {
                display: block;
                background-color: #3f95eb;
                width: 18%;
                padding: 26px 30px;
                margin-bottom: 22px;
                border-radius: 14px;
                text-decoration: none;
                color: #e5e7eb;
                font-size: 18px;
                box-shadow: 0 10px 22px rgba(0, 0, 0, 0.5);
                transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            }

            .card:hover {
                background-color: #2f73b7;
                transform: translateY(-4px);
                box-shadow: 0 16px 32px rgba(0, 0, 0, 0.65);
            }

            .card span {
                color: #38bdf8; 
                font-weight: bold;
            }

            .card:active {
                transform: translateY(-1px);
                box-shadow: 0 6px 14px rgba(0, 0, 0, 0.6);
            }
        </style>
    </head>
    <body>
        <h3>Dati inseriti non validi (l'email è già stata utilizzata o il nome del corso è già stato usato)!</h3> <br>
        <!-- QUANDO ATTIVA LA PARTE DI REGISTRAZIONE DA MODIFICARE CON: -->
        <!-- <h3>Dati inseriti non validi! (email già utilizzata)</h3> <br> -->
        
        <a class="card">
            torna all' <span>inserimento corsi</span>
        </a>
        <!-- SE LA PARTE ATTIVA è QUEllA DI REGISTRAZIONE CAMBIARE CON: -->
        <!-- <a class="card">
            torna alla <span>registrazione</span>
        </a> -->
    </body>
    <script src="./js/config.js"></script>
    <script>
        const link = document.querySelector('.card');
        link.setAttribute('href', `${HTTP_BASE}/inserimentoCorsi`);
        //SE LA PARTE ATTIVA è QUEllA DI REGISTRAZIONE CAMBIARE CON:
        //link.setAttribute('href', `${HTTP_BASE}/registrazione`);
    </script>
</html>
